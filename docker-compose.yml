services:
  db:
    image: postgres:16-alpine
    container_name: arcar_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_123
      POSTGRES_DB: my_database
    ports:
      - "5433:5432"
    volumes:
      - arcar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: arcar_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password_123@db:5432/my_database
      - PROJECT_NAME=Arcar Wellness Backend
      - API_PREFIX=/api
      - JWT_SECRET_KEY=supersecretkeyforarcarwellnessaccess12345
      - JWT_REFRESH_SECRET_KEY=supersecretrefreshkeyforarcarwellness67890
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: arcar_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin_password_123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8082:80"
    volumes:
      - arcar_pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  arcar_postgres_data:
    driver: local
  arcar_pgadmin_data:
    driver: local
